<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f177ae" />
  <meta name="description" content="thay — your home base for all thay-applications" />
  <title>thay — home base</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <!-- --font-body / --font-mono in tokens.css reference DM Sans / Space Mono
       but nothing ever loaded them — body text and mono UI elements were
       silently falling back to system fonts. Load both here. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Critical inline CSS so page isn't blank while fonts/JS load ─── */
    @font-face{font-family:'STALPH';src:url('/assets/fonts/STALPH.ttf') format('truetype');font-display:swap}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;color:#231F20;background:linear-gradient(135deg,#fef4f8 0%,#fdf0f5 30%,#fefefe 60%,#f8f4ff 100%);min-height:100vh;line-height:1.6}
    #app{position:relative;z-index:1}
    .loading-page{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;text-align:center}
    .loading-logo{font-family:'STALPH','Space Mono',monospace;font-size:2.5rem;color:#f177ae;letter-spacing:.05em}
    .loading-spinner{width:24px;height:24px;border:2.5px solid rgba(241,119,174,.15);border-top-color:#f177ae;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-page">
      <div class="loading-logo">thay</div>
      <div class="loading-spinner"></div>
      <p style="color:rgba(35,31,32,.5);font-size:.875rem">loading home base…</p>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
