# thay-auth — universal auth microservice. Hardened by default:
# non-root, all caps dropped, capped RAM/CPU, published ONLY to host-local.
# Front it with nginx + certbot for public TLS.
#
# DIRECT_SQL_USERS=1 writes users directly into PocketBase's SQLite file.
# The PB data dir must be bind-mounted in (read-write) at /pb_data so the
# Node container and the PocketBase process see the same `users` table.
services:
  thay-auth:
    build:
      context: https://github.com/thaypley/thay-auth.git#main
    image: thay-auth:latest
    container_name: thay-auth
    restart: unless-stopped
    env_file: .env
    ports:
      # host-local only — never 0.0.0.0. nginx reverse-proxies a subdomain here.
      - "127.0.0.1:3749:3749"
    volumes:
      # Bind-mount the live PocketBase data dir so DIRECT_SQL_USERS writes
      # are visible to PB's Go auth verifier. Path on the VPS:
      # /home/thaypley/pocketbase/pb_data  →  /pb_data
      - /home/thaypley/pocketbase/pb_data:/pb_data:rw
    mem_limit: 256m
    cpus: 0.25
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3749/auth/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
